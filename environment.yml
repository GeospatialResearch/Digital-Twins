# YML file for setting up the Digital-Twin Python environment
# Locked down most package versions to reduce docker build to,e

name: digitaltwin
channels:
  - conda-forge
  - defaults
dependencies:
  - aiohttp==3.13.3
  - botocore==1.42.66
  - celery==5.6.2
  - conda-pack==0.9.1 # Versions past this have bugs with scrapy dependencies not being packaged
  - flask-cors==6.0.2
  - flask-swagger-ui==5.21.0
  - flask==3.1.3
  - geoalchemy2==0.18.4
  - geoapis==0.3.4
  - geopandas==1.1.3
  - gevent==25.9.1
  - gunicorn==25.1.0
  - lxml==6.0.2
  - pandas==3.0.1
  - pip
  - psycopg2==2.9.11 # Needed for Linux environments
  - pyarrow==23.0.1
  - pytest==9.0.2
  - python-dotenv==1.2.2
  - python>=3.13
  - redis==5.0.3
  - scrapy==2.14.1
  - setuptools==82.0.1
  - sqlalchemy==2.0.48
  - pip:
      - git+https://github.com/GeospatialResearch/OWSLib.git
      - pywps==4.7.0 # pywps is available in conda but our fork of OWSLib is required for bounding boxes

prefix: 
